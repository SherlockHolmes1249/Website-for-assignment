<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduSubmit — Assignment Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
      --border: rgba(255,255,255,0.07); --accent: #7c6bff; --accent2: #ff6b9d;
      --accent3: #6bffd8; --text: #f0f0f8; --muted: #7878a0;
      --success: #4ade80; --warning: #fbbf24; --danger: #f87171;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,107,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,107,157,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 60% 10%, rgba(107,255,216,0.06) 0%, transparent 50%);
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.9rem 1.2rem;
      background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .btn-admin { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.8rem; font-weight: 500; cursor: pointer; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
    .btn-admin:hover { border-color: var(--accent); color: var(--accent); }

    /* HERO */
    .hero { position: relative; z-index: 1; text-align: center; padding: 3.5rem 1.2rem 2.5rem; }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(124,107,255,0.1); border: 1px solid rgba(124,107,255,0.3); color: var(--accent); padding: 0.3rem 0.9rem; border-radius: 999px; font-size: 0.72rem; font-weight: 500; margin-bottom: 1.2rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .hero h1 { font-family: 'Syne', sans-serif; font-size: clamp(2rem, 9vw, 4.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1rem; }
    .hero h1 .line2 { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--accent3) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--muted); font-size: clamp(0.9rem, 3vw, 1.05rem); max-width: 440px; margin: 0 auto 2rem; line-height: 1.7; }

    /* STATS */
    .stats-bar { position: relative; z-index: 1; display: flex; justify-content: center; max-width: 420px; margin: 0 auto 3.5rem; padding: 0 1.2rem; }
    .stat { flex: 1; text-align: center; padding: 1rem 0.5rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    .stat:first-child { border-left: 1px solid var(--border); border-radius: 12px 0 0 12px; }
    .stat:last-child { border-radius: 0 12px 12px 0; }
    .stat-num { font-family: 'Syne', sans-serif; font-size: clamp(1.3rem, 5vw, 1.8rem); font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .stat-label { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.06em; }

    /* SECTION */
    .section { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 1.2rem 5rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; gap: 0.8rem; flex-wrap: wrap; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .filter-tabs { display: flex; gap: 0.4rem; }
    .tab { padding: 0.3rem 0.8rem; border-radius: 8px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
    .tab.active, .tab:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

    /* CARDS */
    #assignments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 340px), 1fr)); gap: 1rem; }
    .assignment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.3rem; transition: all 0.3s; position: relative; overflow: hidden; animation: fadeInUp 0.5s ease both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .assignment-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); opacity: 0; transition: opacity 0.3s; }
    .assignment-card:hover { border-color: rgba(124,107,255,0.3); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 16px 32px rgba(0,0,0,0.3); }
    .assignment-card:hover::before { opacity: 1; }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 0.5rem; }
    .subject-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: rgba(124,107,255,0.12); border: 1px solid rgba(124,107,255,0.2); flex-shrink: 0; }
    .due-badge { display: flex; align-items: center; font-size: 0.68rem; padding: 0.22rem 0.6rem; border-radius: 999px; font-weight: 500; white-space: nowrap; }
    .due-badge.urgent { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.2); }
    .due-badge.soon { background: rgba(251,191,36,0.12); color: var(--warning); border: 1px solid rgba(251,191,36,0.2); }
    .due-badge.ok { background: rgba(74,222,128,0.12); color: var(--success); border: 1px solid rgba(74,222,128,0.2); }
    .card-subject { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .card-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.1rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; flex-wrap: wrap; }
    .due-info { font-size: 0.75rem; color: var(--muted); }
    .due-info span { color: var(--text); font-weight: 500; }
    .btn-submit-card { background: linear-gradient(135deg, var(--accent), #9b6bff); color: white; border: none; padding: 0.5rem 1.1rem; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap; -webkit-appearance: none; }
    .btn-submit-card:hover { transform: scale(1.04); box-shadow: 0 8px 20px rgba(124,107,255,0.4); }
    .btn-submit-card:active { transform: scale(0.97); }
    .empty-state { grid-column: 1/-1; text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 0.4rem; color: var(--text); }

    /* MODAL — bottom sheet on mobile, centered on desktop */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px 22px 0 0; width: 100%; max-height: 93vh; overflow-y: auto; padding: 0.5rem 1.3rem 2rem; position: relative; animation: slideUp 0.35s cubic-bezier(0.32,0.72,0,1); }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 999px; margin: 0.8rem auto 1.3rem; display: block; }
    .modal-close { position: absolute; top: 1rem; right: 1rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; padding: 1rem; }
      .modal { border-radius: 22px; max-width: 500px; max-height: 90vh; padding: 2.2rem; animation: modalIn 0.3s ease; }
      .modal-handle { display: none; }
      @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    }

    .modal h2 { font-family: 'Syne', sans-serif; font-size: 1.35rem; font-weight: 700; margin-bottom: 0.4rem; }
    .modal-subject-tag { display: inline-block; background: rgba(124,107,255,0.12); color: var(--accent); border: 1px solid rgba(124,107,255,0.25); padding: 0.22rem 0.75rem; border-radius: 999px; font-size: 0.75rem; font-weight: 500; margin-bottom: 1.4rem; }
    .form-group { margin-bottom: 1.1rem; }
    .form-group label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; letter-spacing: 0.03em; text-transform: uppercase; }
    .form-group input, .form-group textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 0.75rem 1rem; border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .drop-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.3s; background: var(--surface2); position: relative; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(124,107,255,0.05); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
    .drop-text { font-size: 0.85rem; color: var(--muted); }
    .drop-text strong { color: var(--accent); }
    .drop-hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
    .file-selected { display: flex; align-items: center; gap: 0.8rem; background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); border-radius: 8px; padding: 0.65rem 0.9rem; margin-top: 0.7rem; }
    .file-selected .file-icon { font-size: 1.2rem; flex-shrink: 0; }
    .file-name { font-size: 0.8rem; font-weight: 500; color: var(--success); word-break: break-all; }
    .file-size { font-size: 0.7rem; color: var(--muted); }
    .btn-primary { width: 100%; background: linear-gradient(135deg, var(--accent), #9b6bff); color: white; border: none; padding: 0.9rem; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.3s; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; -webkit-appearance: none; }
    .btn-primary:hover { box-shadow: 0 12px 32px rgba(124,107,255,0.45); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .success-modal { text-align: center; padding: 1rem 0; }
    .success-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(74,222,128,0.12); border: 2px solid rgba(74,222,128,0.3); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1.2rem; }
    .success-modal h2 { font-family: 'Syne', sans-serif; margin-bottom: 0.6rem; }
    .success-modal p { color: var(--muted); font-size: 0.88rem; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST — centered bottom */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 2000; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 1.2rem; display: flex; align-items: center; gap: 0.7rem; font-size: 0.85rem; opacity: 0; transition: all 0.3s; max-width: calc(100vw - 2rem); }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { border-color: rgba(248,113,113,0.4); }
    .toast.success { border-color: rgba(74,222,128,0.4); }

    footer { position: relative; z-index: 1; text-align: center; padding: 1.5rem; color: var(--muted); font-size: 0.78rem; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">EduSubmit</div>
    <a href="admin/index.html" class="btn-admin">⚙ Admin</a>
  </nav>

  <section class="hero">
    <div class="hero-badge">✦ Student Portal</div>
    <h1>Submit Your<br><span class="line2">Assignments</span></h1>
    <p>Browse open assignments, upload your files, and you're done in seconds.</p>
  </section>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Open</div></div>
    <div class="stat"><div class="stat-num" id="stat-due-soon">0</div><div class="stat-label">Due Soon</div></div>
    <div class="stat"><div class="stat-num" id="stat-subjects">0</div><div class="stat-label">Subjects</div></div>
  </div>

  <section class="section" id="assignments">
    <div class="section-header">
      <h2 class="section-title">Open Assignments</h2>
      <div class="filter-tabs">
        <button class="tab active" onclick="filterCards('all',this)">All</button>
        <button class="tab" onclick="filterCards('urgent',this)">Urgent</button>
        <button class="tab" onclick="filterCards('soon',this)">Soon</button>
      </div>
    </div>
    <div id="assignments-grid">
      <div class="empty-state"><div class="icon">📋</div><h3>Loading assignments…</h3></div>
    </div>
  </section>

  <div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
    <div class="modal" id="modal-content">
      <span class="modal-handle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>Built with ❤ · EduSubmit · <a href="admin/index.html" style="color:var(--accent);text-decoration:none">Admin</a></footer>

  <script>
    let assignments = [], selectedAssignment = null;
    const ICONS = ['📚','📐','🔬','🌍','📝','🎨','🧮','💻','📖','🏛'];

    async function loadAssignments() {
      try {
        const res = await fetch('/.netlify/functions/get-assignments');
        const data = await res.json();
        assignments = data.assignments || [];
      } catch(e) { assignments = []; }
      renderCards(assignments); updateStats();
    }

    function getDueStatus(d) { const diff=(new Date(d)-new Date())/(1000*60*60*24); return diff<1?'urgent':diff<3?'soon':'ok'; }
    function formatDueDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    function getDaysLeft(d) { const diff=Math.ceil((new Date(d)-new Date())/(1000*60*60*24)); if(diff<=0)return'⚠ Overdue'; if(diff===1)return'🔴 1 day left'; if(diff<=3)return`🟡 ${diff} days left`; return`🟢 ${diff} days left`; }

    function renderCards(list) {
      const grid = document.getElementById('assignments-grid');
      if (!list.length) { grid.innerHTML=`<div class="empty-state"><div class="icon">🎉</div><h3>No assignments right now</h3><p>Check back later.</p></div>`; return; }
      const labels={urgent:'🔴 Due Today',soon:'🟡 Due Soon',ok:'🟢 On Track'};
      grid.innerHTML = list.map((a,i) => {
        const s=getDueStatus(a.dueDate);
        return `<div class="assignment-card" style="animation-delay:${i*0.07}s">
          <div class="card-top"><div class="subject-icon">${ICONS[i%ICONS.length]}</div><div class="due-badge ${s}">${labels[s]}</div></div>
          <div class="card-subject">${escHtml(a.subject)}</div>
          <div class="card-desc">${escHtml(a.description||'Submit your assignment file (PDF or Word document).')}</div>
          <div class="card-footer">
            <div class="due-info">Due: <span>${formatDueDate(a.dueDate)}</span><br><small>${getDaysLeft(a.dueDate)}</small></div>
            <button class="btn-submit-card" onclick="openSubmitModal('${a.id}')">Submit ↑</button>
          </div>
        </div>`;
      }).join('');
    }

    function filterCards(type,btn) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); renderCards(type==='all'?assignments:assignments.filter(a=>getDueStatus(a.dueDate)===type)); }
    function updateStats() { document.getElementById('stat-total').textContent=assignments.length; document.getElementById('stat-due-soon').textContent=assignments.filter(a=>['urgent','soon'].includes(getDueStatus(a.dueDate))).length; document.getElementById('stat-subjects').textContent=new Set(assignments.map(a=>a.subject)).size; }

    function openSubmitModal(id) {
      selectedAssignment=assignments.find(a=>a.id===id); if(!selectedAssignment)return;
      document.getElementById('modal-body').innerHTML=buildForm(selectedAssignment);
      document.getElementById('modal').classList.add('open');
      document.body.style.overflow='hidden'; setupDropzone();
    }

    function buildForm(a) {
      return `<h2>Submit Assignment</h2>
        <div class="modal-subject-tag">📚 ${escHtml(a.subject)}</div>
        <div class="form-group"><label>Your Full Name</label><input type="text" id="student-name" placeholder="Enter your full name" autocomplete="name"></div>
        <div class="form-group"><label>Student ID / Roll No.</label><input type="text" id="student-id" placeholder="e.g. 2024-CS-045"></div>
        <div class="form-group"><label>Assignment File</label>
          <div class="drop-zone" id="drop-zone">
            <input type="file" id="file-input" accept=".pdf,.doc,.docx">
            <div class="drop-icon">📎</div>
            <div class="drop-text"><strong>Tap to upload</strong></div>
            <div class="drop-hint">PDF, DOC, DOCX · Max 20MB</div>
          </div>
          <div id="file-info"></div>
        </div>
        <div class="form-group"><label>Note (optional)</label><textarea id="student-note" placeholder="Any comments…"></textarea></div>
        <button class="btn-primary" id="submit-btn" onclick="submitAssignment()"><span id="submit-label">Submit Assignment</span></button>`;
    }

    function setupDropzone() {
      const dz=document.getElementById('drop-zone'), fi=document.getElementById('file-input'); if(!dz||!fi)return;
      dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});
      dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
      dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])showFile(e.dataTransfer.files[0]);});
      fi.addEventListener('change',()=>{if(fi.files[0])showFile(fi.files[0]);});
    }

    function showFile(f) { const ext=f.name.split('.').pop().toLowerCase(); document.getElementById('file-info').innerHTML=`<div class="file-selected"><span class="file-icon">${ext==='pdf'?'📄':'📝'}</span><div><div class="file-name">${escHtml(f.name)}</div><div class="file-size">${(f.size/1024/1024).toFixed(2)} MB</div></div></div>`; }

    async function submitAssignment() {
      const name=document.getElementById('student-name')?.value.trim();
      const sid=document.getElementById('student-id')?.value.trim();
      const file=document.getElementById('file-input')?.files[0];
      const note=document.getElementById('student-note')?.value.trim();
      if(!name)return showToast('Please enter your full name.','error');
      if(!sid)return showToast('Please enter your Student ID.','error');
      if(!file)return showToast('Please select a file.','error');
      const ext=file.name.split('.').pop().toLowerCase();
      if(!['pdf','doc','docx'].includes(ext))return showToast('Only PDF, DOC, DOCX allowed.','error');
      if(file.size>20*1024*1024)return showToast('File too large. Max 20MB.','error');
      const btn=document.getElementById('submit-btn'); btn.disabled=true;
      document.getElementById('submit-label').innerHTML='<div class="spinner"></div> Submitting…';
      const fd=new FormData(); fd.append('assignmentId',selectedAssignment.id); fd.append('subject',selectedAssignment.subject); fd.append('studentName',name); fd.append('studentId',sid); fd.append('note',note||''); fd.append('file',file);
      try {
        const res=await fetch('/.netlify/functions/submit-assignment',{method:'POST',body:fd});
        const data=await res.json();
        if(data.success) {
          document.getElementById('modal-body').innerHTML=`<div class="success-modal"><div class="success-icon">✓</div><h2>Submitted!</h2><p>Your assignment for <strong>${escHtml(selectedAssignment.subject)}</strong> has been received.</p><p style="margin-top:0.5rem;font-size:0.72rem;color:var(--muted)">Ref: ${data.submissionId||'N/A'}</p></div>`;
          setTimeout(()=>{closeModal();showToast('Assignment submitted! ✓','success');},1800);
        } else throw new Error(data.error||'Submission failed');
      } catch(e) { btn.disabled=false; document.getElementById('submit-label').textContent='Submit Assignment'; showToast('Failed: '+e.message,'error'); }
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; selectedAssignment=null; }
    function closeModalOnOverlay(e) { if(e.target===document.getElementById('modal'))closeModal(); }
    function showToast(msg,type='success') { const t=document.getElementById('toast'); t.innerHTML=`<span>${type==='success'?'✓':'✕'}</span> ${escHtml(msg)}`; t.className=`toast ${type} show`; setTimeout(()=>t.className='toast',3500); }
    function escHtml(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    loadAssignments();
  </script>
</body>
</html>
